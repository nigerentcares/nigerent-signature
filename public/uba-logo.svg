<svg width="160" height="56" viewBox="0 0 160 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Red background — UBA brand red -->
  <rect width="160" height="56" rx="4" fill="#CE1126"/>

  <!-- "UBA" text -->
  <text
    x="18" y="39"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="900"
    fill="white"
    letter-spacing="2"
  >UBA</text>

  <!--
    UBA geometric mark — angular overlapping shapes.
    The mark consists of two overlapping angular planes
    creating a 3D layered effect, resembling folded paper.
  -->
  <g transform="translate(112, 9)">
    <!-- Back layer — taller, slightly transparent -->
    <path d="M8,38 L20,2 L36,22 L28,38 Z" fill="white" opacity="0.5"/>
    <!-- Front layer — the prominent angular shape -->
    <path d="M0,38 L18,6 L34,12 L14,38 Z" fill="white"/>
  </g>
</svg>
